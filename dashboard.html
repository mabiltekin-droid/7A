<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sınıf ve Okul Platformu</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="i18n.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-school"></i>
                <span data-i18n="appTitle">Sınıf ve Okul Platformu</span>
            </div>
            <div class="user-info" style="padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div class="user-avatar" id="userAvatar" style="width: 40px; height: 40px; border-radius: 50%; background: white; color: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 600;">A</div>
                    <div style="color: white;">
                        <div style="font-weight: 600; font-size: 14px;" id="userName">Admin</div>
                        <div style="font-size: 11px; opacity: 0.7;" id="userRole">Admin</div>
                    </div>
                </div>
                <button onclick="App.logout()" style="width: 100%; margin-top: 10px; padding: 8px; border: none; background: rgba(255,255,255,0.1); color: white; border-radius: 6px; cursor: pointer; font-size: 13px;">
                    <i class="fas fa-sign-out-alt"></i> <span data-i18n="logout">Çıkış Yap</span>
                </button>
            </div>
            <nav class="nav-menu" id="navMenu">
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Ara..." id="globalSearch" data-i18n-placeholder="search">
                </div>
                <div class="top-bar-right">
                    <div class="class-info" id="classInfo">
                        <i class="fas fa-school"></i>
                        <span>Sınıf: Belirtilmedi</span>
                    </div>
                    <button class="dark-mode-toggle" id="darkModeToggle" onclick="App.toggleDarkMode()">
                        <i class="fas fa-moon"></i>
                        <span data-i18n="darkMode">Karanlık</span>
                    </button>
                    <div class="lang-dropdown" style="position: relative;">
                        <button class="btn-icon" id="langBtn" style="width: auto; padding: 8px 12px; gap: 5px;" onclick="document.getElementById('langMenu').style.display = document.getElementById('langMenu').style.display === 'none' ? 'block' : 'none'">
                            <i class="fas fa-globe"></i>
                            <span id="currentLang">TR</span>
                        </button>
                        <div id="langMenu" style="display: none; position: absolute; top: 100%; right: 0; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); padding: 5px; z-index: 100; min-width: 140px;">
                            <button onclick="googleTranslateLanguage('tr')" style="display: block; width: 100%; padding: 8px 12px; border: none; background: none; text-align: left; cursor: pointer; border-radius: 5px;">🇹🇷 Türkçe</button>
                            <button onclick="googleTranslateLanguage('en')" style="display: block; width: 100%; padding: 8px 12px; border: none; background: none; text-align: left; cursor: pointer; border-radius: 5px;">🇬🇧 English</button>
                            <button onclick="googleTranslateLanguage('es')" style="display: block; width: 100%; padding: 8px 12px; border: none; background: none; text-align: left; cursor: pointer; border-radius: 5px;">🇪🇸 Español</button>
                            <button onclick="googleTranslateLanguage('de')" style="display: block; width: 100%; padding: 8px 12px; border: none; background: none; text-align: left; cursor: pointer; border-radius: 5px;">🇩🇪 Deutsch</button>
                            <button onclick="googleTranslateLanguage('fr')" style="display: block; width: 100%; padding: 8px 12px; border: none; background: none; text-align: left; cursor: pointer; border-radius: 5px;">🇫🇷 Français</button>
                            <button onclick="googleTranslateLanguage('it')" style="display: block; width: 100%; padding: 8px 12px; border: none; background: none; text-align: left; cursor: pointer; border-radius: 5px;">🇮🇹 Italiano</button>
                            <button onclick="googleTranslateLanguage('ja')" style="display: block; width: 100%; padding: 8px 12px; border: none; background: none; text-align: left; cursor: pointer; border-radius: 5px;">🇯🇵 日本語</button>
                            <button onclick="googleTranslateLanguage('ru')" style="display: block; width: 100%; padding: 8px 12px; border: none; background: none; text-align: left; cursor: pointer; border-radius: 5px;">🇷🇺 Русский</button>
                            <button onclick="googleTranslateLanguage('zh-CN')" style="display: block; width: 100%; padding: 8px 12px; border: none; background: none; text-align: left; cursor: pointer; border-radius: 5px;">🇨🇳 中文</button>
                            <button onclick="googleTranslateLanguage('ar')" style="display: block; width: 100%; padding: 8px 12px; border: none; background: none; text-align: left; cursor: pointer; border-radius: 5px;">🇸🇦 العربية</button>
                            <button onclick="googleTranslateLanguage('pt')" style="display: block; width: 100%; padding: 8px 12px; border: none; background: none; text-align: left; cursor: pointer; border-radius: 5px;">🇧🇷 Português</button>
                            <button onclick="googleTranslateLanguage('hi')" style="display: block; width: 100%; padding: 8px 12px; border: none; background: none; text-align: left; cursor: pointer; border-radius: 5px;">🇮🇳 हिन्दी</button>
                            <button onclick="googleTranslateLanguage('ko')" style="display: block; width: 100%; padding: 8px 12px; border: none; background: none; text-align: left; cursor: pointer; border-radius: 5px;">🇰🇷 한국어</button>
                        </div>
                    </div>
                    <button class="btn-icon" id="notificationBtn" onclick="App.showNotifications()" title="Bildirimler" style="position: relative;">
                        <i class="fas fa-bell"></i>
                        <span id="notificationBadge" style="position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; font-size: 10px; padding: 2px 5px; border-radius: 50%; display: none;">0</span>
                    </button>
                    <button class="btn-icon" id="exportData" title="Dışa Aktar">
                        <i class="fas fa-download"></i>
                    </button>
                    <button class="btn-icon" id="importData" title="İçe Aktar">
                        <i class="fas fa-upload"></i>
                    </button>
                </div>
            </header>

            <div class="page-content" id="pageContent">
            </div>
        </main>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Modal Başlık</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
            </div>
            <div class="modal-footer" id="modalFooter">
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <input type="file" id="importFile" accept=".json" style="display:none">

    <script src="app.js"></script>
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'tr', includedLanguages: 'tr,en,es,de,fr,it,ja,ru,zh-CN,ar,pt,hi,ko'}, 'google_translate_element');
        }
        
        function googleTranslateLanguage(lang) {
            var selectField = document.querySelector('.goog-te-combo');
            if (selectField) {
                selectField.value = lang;
                selectField.dispatchEvent(new Event('change'));
            }
            document.getElementById('langMenu').style.display = 'none';
            var langNames = {tr:'TR', en:'EN', es:'ES', de:'DE', fr:'FR', it:'IT', ja:'JA', ru:'RU', 'zh-CN':'ZH', ar:'AR', pt:'PT', hi:'HI', ko:'KO'};
            document.getElementById('currentLang').textContent = langNames[lang] || lang.toUpperCase();
            localStorage.setItem('appLang', lang);
        }
        function googleTranslateLanguage(lang) {
            var selectField = document.querySelector('.goog-te-combo');
            if (selectField) {
                selectField.value = lang;
                selectField.dispatchEvent(new Event('change'));
            }
            document.getElementById('langMenu').style.display = 'none';
            var langNames = {tr:'TR', en:'EN', es:'ES', de:'DE', fr:'FR', it:'IT', ja:'JA'};
            document.getElementById('currentLang').textContent = langNames[lang] || lang.toUpperCase();
            localStorage.setItem('appLang', lang);
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <div id="google_translate_element" style="display:none;"></div>
</body>
</html>
