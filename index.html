<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sınıf ve Okul Platformu - <span data-i18n="login">Giriş</span></title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="i18n.js"></script>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #4f46e5 0%, #4338ca 50%, #3730a3 100%);
            margin: 0;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-logo i {
            font-size: 50px;
            color: #4f46e5;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .login-logo h1 {
            font-size: 24px;
            color: #1e293b;
            margin: 0;
        }
        .login-logo p {
            color: #64748b;
            font-size: 14px;
            margin-top: 5px;
        }
        .login-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 25px;
            background: #f1f5f9;
            padding: 5px;
            border-radius: 10px;
        }
        .login-tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #64748b;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .login-tab.active {
            background: white;
            color: #4f46e5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .login-form {
            display: none;
        }
        .login-form.active {
            display: block;
        }
        .role-select-container {
            margin-bottom: 20px;
        }
        .demo-info {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #1e40af;
        }
        .demo-info strong {
            display: block;
            margin-bottom: 8px;
        }
        .demo-info code {
            background: #dbeafe;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-right: 45px;
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #64748b;
            transition: color 0.3s;
        }
        .toggle-password:hover {
            color: #4f46e5;
        }
        .login-success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #4f46e5 0%, #4338ca 50%, #3730a3 100%);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 9999;
        }
        .login-success-overlay.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .success-content {
            text-align: center;
            color: white;
        }
        .success-icon {
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            animation: successPop 0.5s ease;
        }
        @keyframes successPop {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        .success-icon i {
            font-size: 60px;
            animation: checkBounce 0.5s ease 0.3s both;
        }
        @keyframes checkBounce {
            0% { transform: scale(0) rotate(-45deg); }
            50% { transform: scale(1.2) rotate(0deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        .success-content h2 {
            font-size: 32px;
            margin-bottom: 10px;
            animation: slideUp 0.5s ease 0.4s both;
        }
        .success-content p {
            font-size: 18px;
            opacity: 0.9;
            animation: slideUp 0.5s ease 0.5s both;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: confettiFall 3s ease-out forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <i class="fas fa-graduation-cap"></i>
            <h1 data-i18n="appTitle">Sınıf ve Okul Platformu</h1>
            <p>7-A <span data-i18n="class">Sınıf</span></p>
        </div>

        <div class="language-selector" style="display: flex; gap: 8px; margin-bottom: 20px; justify-content: center;">
            <button type="button" class="lang-btn" onclick="setLanguage('tr')" style="padding: 6px 12px; border: 1px solid #e2e8f0; background: white; border-radius: 6px; cursor: pointer; font-weight: 600;">🇹🇷 TR</button>
            <button type="button" class="lang-btn" onclick="setLanguage('en')" style="padding: 6px 12px; border: 1px solid #e2e8f0; background: white; border-radius: 6px; cursor: pointer;">🇬🇧 EN</button>
            <button type="button" class="lang-btn" onclick="setLanguage('es')" style="padding: 6px 12px; border: 1px solid #e2e8f0; background: white; border-radius: 6px; cursor: pointer;">🇪🇸 ES</button>
        </div>

        <div class="login-tabs">
            <button class="login-tab active" data-role="admin">Admin</button>
            <button class="login-tab" data-role="teacher">Öğretmen</button>
            <button class="login-tab" data-role="student">Öğrenci</button>
            <button class="login-tab" data-role="parent">Veli</button>
        </div>

        <div class="demo-info">
            <strong>Demo Giriş:</strong>
            <div><code>admin</code> / <code>admin123</code> (Admin)</div>
            <div><code>ogretmen</code> / <code>ogretmen123</code> (Öğretmen)</div>
            <div><code>ogrenci</code> / <code>ogrenci123</code> (Öğrenci)</div>
            <div><code>veli</code> / <code>veli123</code> (Veli)</div>
        </div>

        <form class="login-form active" data-role="admin" id="loginForm">
            <div class="form-group">
                <label>Kullanıcı Adı</label>
                <input type="text" id="username" placeholder="Kullanıcı adı" required>
            </div>
            <div class="form-group">
                <label>Şifre</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Şifre" required>
                    <span class="toggle-password" onclick="togglePassword()">
                        <i class="fas fa-eye" id="passwordIcon"></i>
                    </span>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">
                <i class="fas fa-sign-in-alt"></i> Giriş Yap
            </button>
            <div id="loginError" style="color: #ef4444; text-align: center; margin-top: 10px; display: none;"></div>
        </form>

        <p style="text-align: center; margin-top: 20px; color: #64748b; font-size: 13px;">
            Hesabınız yoksa admin ile iletişime geçin
        </p>
        <p style="text-align: center; margin-top: 10px;">
            <a href="#" onclick="resetUsers(); return false;" style="color: #ef4444; font-size: 12px; text-decoration: none;">
                <i class="fas fa-refresh"></i> Şifremi Unuttum / Kullanıcıları Sıfırla
            </a>
        </p>
        <script>
            function setLanguage(lang) {
                i18n.setLang(lang);
                document.querySelectorAll('.lang-btn').forEach(btn => {
                    btn.style.fontWeight = '400';
                });
                event.target.style.fontWeight = '600';
                updateLoginTexts();
            }
            
            function updateLoginTexts() {
                const t = i18n.t.bind(i18n);
                document.querySelector('.demo-info strong').textContent = t('login') + ':';
                document.querySelectorAll('.login-tab')[0].textContent = 'Admin';
                document.querySelectorAll('.login-tab')[1].textContent = t('teachers');
                document.querySelectorAll('.login-tab')[2].textContent = t('students');
                document.querySelectorAll('.login-tab')[3].textContent = t('parents');
                document.querySelector('label[for="username"]').textContent = t('username');
                document.querySelector('label[for="password"]').textContent = t('password');
                document.querySelector('#username').placeholder = t('username');
                document.querySelector('#password').placeholder = t('password');
                document.querySelector('#loginForm button').innerHTML = '<i class="fas fa-sign-in-alt"></i> ' + t('login');
            }
            
            function resetUsers() {
                if (confirm(i18n.t('confirm') + '?')) {
                    localStorage.removeItem('schoolUsers');
                    localStorage.removeItem('currentUser');
                    location.reload();
                }
            }
            
            function togglePassword() {
                const passwordInput = document.getElementById('password');
                const passwordIcon = document.getElementById('passwordIcon');
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    passwordIcon.className = 'fas fa-eye-slash';
                } else {
                    passwordInput.type = 'password';
                    passwordIcon.className = 'fas fa-eye';
                }
            }
        </script>
    </div>

    <div class="login-success-overlay" id="successOverlay">
        <div class="success-content">
            <div class="success-icon">
                <i class="fas fa-check"></i>
            </div>
            <h2 data-i18n="welcome">Hoş Geldin</h2>
            <p>Yönlendiriliyorsunuz...</p>
        </div>
    </div>

    <script>
        const defaultUsers = {
            users: [
                { id: '1', username: 'admin', password: 'admin123', role: 'admin', name: 'Yönetici' },
                { id: '2', username: 'ogretmen', password: 'ogretmen123', role: 'teacher', name: 'Öğretmen' },
                { id: '3', username: 'ogrenci', password: 'ogrenci123', role: 'student', name: 'Öğrenci', studentId: null },
                { id: '4', username: 'veli', password: 'veli123', role: 'parent', name: 'Veli', studentId: null }
            ]
        };

        function initUsers() {
            const savedUsers = localStorage.getItem('schoolUsers');
            if (!savedUsers) {
                localStorage.setItem('schoolUsers', JSON.stringify(defaultUsers));
            } else {
                try {
                    const parsed = JSON.parse(savedUsers);
                    if (!parsed.users || parsed.users.length === 0) {
                        localStorage.setItem('schoolUsers', JSON.stringify(defaultUsers));
                    }
                } catch (e) {
                    localStorage.setItem('schoolUsers', JSON.stringify(defaultUsers));
                }
            }
        }

        initUsers();

        const loginTabs = document.querySelectorAll('.login-tab');
        const loginForms = document.querySelectorAll('.login-form');
        
        loginTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                loginTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
            });
        });

        function createConfetti() {
            const overlay = document.getElementById('successOverlay');
            const colors = ['#ffd700', '#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ff9ff3', '#54a0ff'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                overlay.appendChild(confetti);
            }
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const usersStr = localStorage.getItem('schoolUsers');
            let users = defaultUsers;
            try {
                users = JSON.parse(usersStr);
                if (!users.users) users = defaultUsers;
            } catch (e) {
                users = defaultUsers;
            }

            const user = users.users.find(u => u.username === username && u.password === password);
            
            if (user) {
                localStorage.setItem('currentUser', JSON.stringify(user));
                const overlay = document.getElementById('successOverlay');
                overlay.classList.add('show');
                createConfetti();
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);
            } else {
                const error = document.getElementById('loginError');
                error.textContent = 'Kullanıcı adı veya şifre hatalı!';
                error.style.display = 'block';
                document.getElementById('password').value = '';
            }
        });
    </script>
</body>
</html>
